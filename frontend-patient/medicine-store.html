<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicine Store - MediQueue AI</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .patient-sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;z-index:1000;background:rgba(255,255,255,0.93);backdrop-filter:blur(20px);border-right:1px solid rgba(8,145,178,0.12);box-shadow:4px 0 24px rgba(8,145,178,0.07);display:flex;flex-direction:column;padding:1.5rem 0 1rem;}
    .ps-logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-weight:800;font-size:1.15rem;color:var(--primary-dark);padding:0 1.2rem 1.4rem;border-bottom:1px solid rgba(8,145,178,0.1);margin-bottom:1rem;}
    .ps-logo i{font-size:1.6rem;color:var(--primary);flex-shrink:0;}
    .ps-logo span{background:linear-gradient(135deg,var(--primary-dark),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
    .ps-user{margin:0 0.75rem 0.75rem;background:linear-gradient(135deg,rgba(8,145,178,0.08),rgba(5,150,105,0.06));border:1px solid rgba(8,145,178,0.12);border-radius:12px;padding:0.65rem 0.9rem;display:flex;align-items:center;gap:8px;}
    .ps-user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0891b2,#059669);display:flex;align-items:center;justify-content:center;color:white;font-size:0.85rem;font-weight:700;flex-shrink:0;}
    .ps-user-name{font-size:0.82rem;font-weight:700;color:#0f172a;}
    .ps-user-role{font-size:0.7rem;color:#64748b;}
    .ps-nav{list-style:none;flex:1;padding:0 0.75rem;display:flex;flex-direction:column;overflow-y:auto;}
    .ps-nav a{text-decoration:none;color:#475569;font-weight:600;font-size:0.9rem;padding:0.65rem 1rem;border-radius:10px;min-height:42px;box-sizing:border-box;transition:background 0.2s,color 0.2s;display:flex;align-items:center;gap:10px;}
    .ps-nav a:hover{color:var(--primary-dark);background:rgba(8,145,178,0.08);}
    .ps-nav a.active{color:var(--primary-dark);background:rgba(8,145,178,0.13);}
    .ps-nav a i{font-size:0.95rem;width:18px;text-align:center;}
    .ps-nav .ps-emergency a{color:#dc2626;background:rgba(220,38,38,0.06);}
    .ps-logout{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;padding:10px 16px;border-radius:10px;font-size:0.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;margin:0.75rem;width:calc(100% - 1.5rem);justify-content:center;}
    .ps-main{margin-left:220px;min-height:100vh;padding:2rem;}
    @media(max-width:900px){.patient-sidebar{width:64px;}.ps-logo span,.ps-nav a span,.ps-user-name,.ps-user-role,.ps-logout span{display:none;}.ps-user{justify-content:center;padding:0.5rem;}.ps-nav a{justify-content:center;padding:0.65rem;}.ps-logout{justify-content:center;padding:10px;}.ps-main{margin-left:64px;}}
    .search-bar{display:flex;gap:0.75rem;margin-bottom:1.5rem;}
    .search-bar input{flex:1;padding:0.85rem 1.2rem;border:2px solid #e2e8f0;border-radius:14px;font-size:1rem;font-family:inherit;outline:none;transition:border-color 0.2s;}
    .search-bar input:focus{border-color:var(--primary);}
    .category-chips{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.5rem;}
    .chip{padding:0.4rem 1rem;border-radius:999px;border:1.5px solid #e2e8f0;background:white;font-size:0.82rem;font-weight:600;color:#475569;cursor:pointer;transition:all 0.2s;}
    .chip:hover,.chip.active{background:var(--primary);color:white;border-color:var(--primary);}
    .med-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
    .med-card{background:white;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:background 0.2s,color 0.2s;display:flex;flex-direction:column;}
    .med-card:hover{box-shadow:0 8px 24px rgba(8,145,178,0.12);transform:translateY(-2px);border-color:#bae6fd;}
    .med-img-wrap{width:100%;height:130px;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .med-img-wrap img{width:100%;height:100%;object-fit:cover;}
    .med-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:#94a3b8;}
    .med-img-placeholder i{font-size:2.2rem;}
    .med-body{padding:1rem;flex:1;display:flex;flex-direction:column;}
    .med-name{font-size:0.95rem;font-weight:800;color:#0f172a;margin-bottom:2px;}
    .med-generic{font-size:0.75rem;color:#64748b;margin-bottom:6px;}
    .med-uses{font-size:0.8rem;color:#475569;margin-bottom:1rem;line-height:1.5;flex:1;}
    .med-actions{display:flex;gap:0.4rem;}
    .btn-apollo{background:linear-gradient(135deg,#e05c00,#c44d00);color:white;border:none;padding:0.45rem 0.8rem;border-radius:9px;font-size:0.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;flex:1;justify-content:center;}
    .btn-1mg{background:linear-gradient(135deg,#e31e24,#b91c1c);color:white;border:none;padding:0.45rem 0.8rem;border-radius:9px;font-size:0.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;flex:1;justify-content:center;}
    .rx-badge{background:#fee2e2;color:#dc2626;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:4px;}
    .cat-badge{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:6px;}
  </style>
</head>
<body>
<div class="bg-pattern"></div>
<aside class="patient-sidebar">
  <a href="patient-home.html" class="ps-logo"><i class="fas fa-hospital-alt"></i><span>MediQueue<br>AI</span></a>
  <div class="ps-user">
    <div class="ps-user-avatar" id="userAvatar">P</div>
    <div><div class="ps-user-name" id="sidebarUserName">Patient</div><div class="ps-user-role">Patient</div></div>
  </div>
  <ul class="ps-nav">
    <li><a href="patient-home.html"><i class="fas fa-home"></i> <span>Home</span></a></li>
    <li><a href="profile.html"><i class="fas fa-user-circle"></i> <span>My Profile</span></a></li>
    <li><a href="my-records.html"><i class="fas fa-file-medical"></i> <span>My Records</span></a></li>
    <li><a href="hospital-services.html"><i class="fas fa-hospital"></i> <span>Hospital Services</span></a></li>
    
    <li><a href="medicine-store.html" class="active"><i class="fas fa-pills"></i> <span>Medicine Store</span></a></li>
    <li><a href="booking.html"><i class="fas fa-calendar-plus"></i> <span>Book Appointment</span></a></li>
    <li><a href="symptom-analyzer.html"><i class="fas fa-brain"></i> <span>AI Analyzer</span></a></li>
    <li><a href="chatbot.html"><i class="fas fa-robot"></i> <span>AI Chatbot</span></a></li>
    <li><a href="queue-display.html"><i class="fas fa-tv"></i> <span>Queue Board</span></a></li>
    <li class="ps-emergency"><a href="emergency-booking.html"><i class="fas fa-triangle-exclamation"></i> <span>Emergency</span></a></li>
  </ul>
  <button class="ps-logout" onclick="patientLogout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
</aside>
<div class="ps-main">
  <div style="margin-bottom:1.5rem;">
    <h1 style="font-size:1.6rem;font-weight:900;color:#0f172a;margin-bottom:0.25rem;"><i class="fas fa-pills" style="color:var(--primary);"></i> Medicine Store</h1>
    <p style="color:#64748b;font-size:0.9rem;">Search any medicine and order from Apollo Pharmacy or 1mg</p>
  </div>
  <div class="search-bar">
    <input type="text" id="medSearch" placeholder="Search medicine name, generic name or use..." oninput="onSearch(this.value)" autocomplete="off">
    <button class="btn-primary" onclick="onSearch(document.getElementById('medSearch').value)"><i class="fas fa-search"></i> Search</button>
  </div>
  <div class="category-chips" id="categoryChips"></div>
  <div id="resultsCount" style="font-size:0.82rem;color:#64748b;margin-bottom:1rem;"></div>
  <div id="medResults"></div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="js/main.js"></script>
<script src="js/medicine-store.js"></script>
<script src="js/medicine-extra.js"></script>
<script>
(function(){
  const s=getCurrentUser();if(!s)return;
  const n=(s.user.name||'Patient').split(' ')[0];
  const a=document.getElementById('userAvatar'),u=document.getElementById('sidebarUserName');
  if(a)a.textContent=n.charAt(0).toUpperCase();if(u)u.textContent=n;
})();
function patientLogout(){
  const s=getCurrentUser();
  if(s&&s.token)fetch(API_BASE+'/api/patients/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:s.token})}).catch(()=>{});
  clearCurrentUser();window.location.href='index.html';
}
</script>
</body>
</html>
