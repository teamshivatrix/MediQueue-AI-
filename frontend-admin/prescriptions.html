<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescriptions - MediQueue AI</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    (function() {
      const base = window.location.port === '3000' ? '' : 'http://localhost:3000';
      const token = sessionStorage.getItem('adminToken');
      if (!token) { window.location.href = 'admin-login.html?redirect=prescriptions.html'; return; }
      fetch(base + '/api/admin/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token }) })
        .then(r=>r.json()).then(d=>{ if(!d.valid){ sessionStorage.removeItem('adminToken'); window.location.href='admin-login.html'; }}).catch(()=>{});
    })();
  </script>
</head>
<body>
<div class="bg-pattern"></div>

<aside class="sidebar">
  <a href="admin-dashboard.html" class="sidebar-logo"><i class="fas fa-hospital"></i><span>MediQueue<br>Admin</span></a>
  <ul class="sidebar-nav">
    <li><a href="admin-dashboard.html"><i class="fas fa-chart-bar"></i> Dashboard</a></li>
    <li><a href="admin-patients-search.html"><i class="fas fa-user-injured"></i> Patients</a></li>
    <li><a href="patients.html"><i class="fas fa-users"></i> Appointments</a></li>
    <li><a href="prescriptions.html" class="active"><i class="fas fa-file-prescription"></i> Prescriptions</a></li>
    <li><a href="lab-reports.html"><i class="fas fa-flask"></i> Lab Reports</a></li>
    <li><a href="ambulance.html"><i class="fas fa-truck-medical"></i> Ambulance</a></li>
    <li><a href="doctor-management.html"><i class="fas fa-user-md"></i> Doctors</a></li>
    <li><a href="completed-appointments.html"><i class="fas fa-check-double"></i> Completed</a></li>
    <li><a href="/patient/queue-display.html"><i class="fas fa-tv"></i> Queue Board</a></li>
  </ul>
  <button class="admin-logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</aside>

<div class="lang-btn-wrapper" id="langBtnWrapper"></div>

<div class="main-content">
  <div class="page-header">
    <h1><i class="fas fa-file-prescription" style="color:var(--accent);"></i> Prescriptions</h1>
    <p>Create and manage patient prescriptions</p>
  </div>

  <div class="container">

    <!-- Search — TOP -->
    <div style="background:white;border-radius:16px;padding:1.2rem 1.5rem;border:1px solid #e2e8f0;box-shadow:0 4px 16px rgba(0,0,0,0.05);margin-bottom:1.5rem;">
      <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:0.9rem;color:#0f172a;"><i class="fas fa-search" style="color:var(--primary);"></i> Search Patient Prescriptions</h3>
      <div style="position:relative;max-width:420px;">
        <input type="text" class="form-control" id="searchPrescName"
          placeholder="Type patient name (min 2 chars)..."
          autocomplete="off"
          oninput="onSearchInput(this.value)"
          onkeydown="if(event.key==='Enter') searchBySelected()">
        <div id="searchSuggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:100;max-height:220px;overflow-y:auto;margin-top:4px;"></div>
      </div>
      <div id="prescriptionsList" style="margin-top:1rem;"><p style="color:#64748b;font-size:0.88rem;">Type a patient name to search prescriptions</p></div>
    </div>

    <!-- Create Prescription Form -->
    <div style="background:white;border-radius:16px;padding:1.5rem;border:1px solid #e2e8f0;box-shadow:0 4px 16px rgba(0,0,0,0.05);margin-bottom:1.5rem;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:1.2rem;color:#0f172a;"><i class="fas fa-plus-circle" style="color:var(--primary);"></i> New Prescription</h3>
      <form id="prescForm" onsubmit="return false;">
        <div class="form-grid">
          <div class="form-group">
            <label>Patient Name *</label>
            <input type="text" class="form-control" id="pPatientName" placeholder="Full name" required>
          </div>
          <div class="form-group">
            <label>Patient Phone *</label>
            <input type="tel" class="form-control" id="pPatientPhone" placeholder="10-digit number" required oninput="autoFillNameFromPhone(this.value, 'pPatientName')">
          </div>
          <div class="form-group">
            <label>Doctor Name *</label>
            <input type="text" class="form-control" id="pDoctorName" placeholder="Dr. Name" required>
          </div>
          <div class="form-group">
            <label>Department</label>
            <select class="form-control" id="pDepartment">
              <option value="">Select</option>
              <option>General Medicine</option><option>Cardiology</option>
              <option>Orthopedics</option><option>Neurology</option>
              <option>Pediatrics</option><option>Dermatology</option>
              <option>ENT</option><option>Ophthalmology</option>
              <option>Gastroenterology</option><option>Psychiatry</option>
            </select>
          </div>
          <div class="form-group">
            <label>Visit Date *</label>
            <input type="date" class="form-control" id="pVisitDate" required>
          </div>
          <div class="form-group">
            <label>Next Visit Date</label>
            <input type="date" class="form-control" id="pNextVisit">
          </div>
          <div class="form-group full-width">
            <label>Diagnosis *</label>
            <textarea class="form-control" id="pDiagnosis" rows="2" placeholder="Patient diagnosis..." required></textarea>
          </div>
          <div class="form-group full-width">
            <label>Doctor Instructions</label>
            <textarea class="form-control" id="pInstructions" rows="2" placeholder="Rest, diet, precautions..."></textarea>
          </div>
        </div>

        <!-- Medicines -->
        <div style="margin-top:1rem;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
            <label style="font-weight:600;font-size:0.88rem;color:#374151;"><i class="fas fa-pills" style="color:var(--secondary);"></i> Medicines</label>
            <button type="button" class="btn-outline btn-sm" onclick="addMedicineRow()"><i class="fas fa-plus"></i> Add Medicine</button>
          </div>
          <div id="medicinesContainer">
            <div class="medicine-row" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:0.5rem;margin-bottom:0.5rem;align-items:center;">
              <input type="text" class="form-control med-name" placeholder="Medicine name" style="font-size:0.85rem;">
              <input type="text" class="form-control med-dosage" placeholder="Dosage (e.g. 500mg)" style="font-size:0.85rem;">
              <input type="text" class="form-control med-duration" placeholder="Duration (e.g. 5 days)" style="font-size:0.85rem;">
              <input type="text" class="form-control med-instructions" placeholder="After food?" style="font-size:0.85rem;">
              <button type="button" onclick="this.closest('.medicine-row').remove()" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1rem;padding:0 4px;"><i class="fas fa-times"></i></button>
            </div>
          </div>
        </div>

        <!-- Attachment -->
        <div class="form-group" style="margin-top:1rem;">
          <label>Attach Files (optional — PDF/Image)</label>
          <input type="file" class="form-control" id="pFiles" accept=".pdf,.jpg,.jpeg,.png" multiple>
        </div>

        <div style="margin-top:1rem;">
          <button type="button" class="btn-primary" onclick="savePrescription()"><i class="fas fa-save"></i> Save Prescription</button>
        </div>
      </form>
    </div>

    <div id="prescriptionsList" style="display:none;"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pVisitDate').value = new Date().toISOString().split('T')[0];
  });

  function addMedicineRow() {
    const row = document.createElement('div');
    row.className = 'medicine-row';
    row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:0.5rem;margin-bottom:0.5rem;align-items:center;';
    row.innerHTML = `
      <input type="text" class="form-control med-name" placeholder="Medicine name" style="font-size:0.85rem;">
      <input type="text" class="form-control med-dosage" placeholder="Dosage" style="font-size:0.85rem;">
      <input type="text" class="form-control med-duration" placeholder="Duration" style="font-size:0.85rem;">
      <input type="text" class="form-control med-instructions" placeholder="After food?" style="font-size:0.85rem;">
      <button type="button" onclick="this.closest('.medicine-row').remove()" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1rem;padding:0 4px;"><i class="fas fa-times"></i></button>
    `;
    document.getElementById('medicinesContainer').appendChild(row);
  }

  async function savePrescription() {
    const name = document.getElementById('pPatientName').value.trim();
    const phone = document.getElementById('pPatientPhone').value.trim();
    const doctor = document.getElementById('pDoctorName').value.trim();
    const dept = document.getElementById('pDepartment').value;
    const visitDate = document.getElementById('pVisitDate').value;
    const nextVisit = document.getElementById('pNextVisit').value;
    const diagnosis = document.getElementById('pDiagnosis').value.trim();
    const instructions = document.getElementById('pInstructions').value.trim();

    if (!name || !phone || !doctor || !visitDate || !diagnosis) {
      showToast('Missing Fields', 'Please fill all required fields', 'warning'); return;
    }

    const medicines = [...document.querySelectorAll('.medicine-row')].map(row => ({
      name: row.querySelector('.med-name').value.trim(),
      dosage: row.querySelector('.med-dosage').value.trim(),
      duration: row.querySelector('.med-duration').value.trim(),
      instructions: row.querySelector('.med-instructions').value.trim()
    })).filter(m => m.name);

    const formData = new FormData();
    formData.append('patientName', name);
    formData.append('patientPhone', phone);
    formData.append('doctorName', doctor);
    formData.append('department', dept);
    formData.append('visitDate', visitDate);
    formData.append('nextVisitDate', nextVisit);
    formData.append('diagnosis', diagnosis);
    formData.append('instructions', instructions);
    formData.append('medicines', JSON.stringify(medicines));

    const files = document.getElementById('pFiles').files;
    for (const f of files) formData.append('attachments', f);

    try {
      showToast('Saving...', 'Please wait', 'info');
      const res = await fetch(API_BASE + '/api/prescriptions', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        showToast('Saved!', 'Prescription saved successfully', 'success');
        document.getElementById('prescForm').reset();
        document.getElementById('pVisitDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('medicinesContainer').innerHTML = '';
        addMedicineRow();
      } else {
        showToast('Error', data.error || 'Save failed', 'error');
      }
    } catch (err) {
      showToast('Error', err.message, 'error');
    }
  }

  let phoneDebounce = null;

  async function autoFillNameFromPhone(phone, nameFieldId) {
    const clean = String(phone).replace(/\D/g, '');
    if (clean.length !== 10) return;
    clearTimeout(phoneDebounce);
    phoneDebounce = setTimeout(async () => {
      try {
        const res = await fetch(API_BASE + '/api/patients/search?q=' + clean);
        const json = await res.json();
        const patients = Array.isArray(json) ? json : (json.patients || []);
        const match = patients.find(p => String(p.phone||'').replace(/\D/g,'') === clean);
        if (match) {
          document.getElementById(nameFieldId).value = match.name;
          document.getElementById(nameFieldId).style.background = '#f0fdf4';
          setTimeout(() => document.getElementById(nameFieldId).style.background = '', 1500);
        }
      } catch (_) {}
    }, 400);
  }

  let searchDebounce = null;
  let selectedPhone = '';

  async function onSearchInput(val) {
    const suggestions = document.getElementById('searchSuggestions');
    clearTimeout(searchDebounce);

    if (val.length < 2) {
      suggestions.style.display = 'none';
      document.getElementById('prescriptionsList').innerHTML = '<p style="color:#64748b;font-size:0.88rem;">Type a patient name to search prescriptions</p>';
      return;
    }

    searchDebounce = setTimeout(async () => {
      try {
        const res = await fetch(API_BASE + '/api/patients/search?q=' + encodeURIComponent(val));
        const json = await res.json();
        const patients = Array.isArray(json) ? json : (json.patients || []);

        if (!patients.length) {
          suggestions.innerHTML = '<div style="padding:0.75rem 1rem;color:#94a3b8;font-size:0.85rem;">No patients found</div>';
          suggestions.style.display = 'block';
          return;
        }

        suggestions.innerHTML = patients.map(p => `
          <div class="search-suggestion-item" onclick="selectPatient('${p._id}','${(p.name||'').replace(/'/g,"\\'")}','${p.phone||''}')"
            style="display:flex;align-items:center;gap:10px;padding:0.65rem 1rem;cursor:pointer;border-bottom:1px solid #f8fafc;transition:background 0.15s;"
            onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='white'">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0891b2,#059669);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:0.85rem;flex-shrink:0;">${(p.name||'?').charAt(0).toUpperCase()}</div>
            <div>
              <div style="font-weight:700;color:#0f172a;font-size:0.88rem;">${p.name}</div>
              <div style="font-size:0.75rem;color:#64748b;">${p.phone||''} ${p.email?'· '+p.email:''}</div>
            </div>
          </div>
        `).join('');
        suggestions.style.display = 'block';
      } catch (_) {}
    }, 300);
  }

  function selectPatient(id, name, phone) {
    selectedPhone = phone;
    document.getElementById('searchPrescName').value = name;
    document.getElementById('searchSuggestions').style.display = 'none';
    // Also auto-fill the new prescription form
    document.getElementById('pPatientName').value = name;
    document.getElementById('pPatientPhone').value = phone;
    searchBySelected();
  }

  async function searchBySelected() {
    if (!selectedPhone) return;
    try {
      const res = await fetch(API_BASE + '/api/prescriptions?phone=' + encodeURIComponent(selectedPhone));
      const data = await res.json();
      renderPrescriptions(data);
    } catch (err) {
      showToast('Error', err.message, 'error');
    }
  }

  // Close suggestions on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#searchPrescName') && !e.target.closest('#searchSuggestions')) {
      document.getElementById('searchSuggestions').style.display = 'none';
    }
  });

  function renderPrescriptions(list) {
    const el = document.getElementById('prescriptionsList');
    if (!list.length) { el.innerHTML = '<p style="color:#64748b;text-align:center;padding:2rem;">No prescriptions found</p>'; return; }

    el.innerHTML = list.map(p => `
      <div style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:1.2rem;margin-bottom:1rem;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;">
          <div>
            <div style="font-weight:800;font-size:1rem;color:#0f172a;">${p.patientName} <span style="font-size:0.78rem;color:#64748b;font-weight:400;">· ${p.patientPhone}</span></div>
            <div style="font-size:0.82rem;color:#0891b2;font-weight:600;margin-top:2px;"><i class="fas fa-user-md"></i> ${p.doctorName} ${p.department ? '· ' + p.department : ''}</div>
            <div style="font-size:0.78rem;color:#64748b;margin-top:2px;">Visit: ${p.visitDate} ${p.nextVisitDate ? '· Next: ' + p.nextVisitDate : ''}</div>
          </div>
          <button onclick="deletePrescription('${p._id}')" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:0.85rem;"><i class="fas fa-trash"></i></button>
        </div>
        <div style="margin-top:0.75rem;padding:0.75rem;background:#f8fafc;border-radius:10px;">
          <div style="font-size:0.85rem;font-weight:700;color:#374151;margin-bottom:4px;">Diagnosis:</div>
          <div style="font-size:0.85rem;color:#475569;">${p.diagnosis}</div>
        </div>
        ${p.medicines && p.medicines.length ? `
        <div style="margin-top:0.75rem;">
          <div style="font-size:0.82rem;font-weight:700;color:#374151;margin-bottom:6px;"><i class="fas fa-pills" style="color:var(--secondary);"></i> Medicines:</div>
          ${p.medicines.map(m => `<div style="font-size:0.82rem;color:#475569;padding:4px 0;border-bottom:1px solid #f1f5f9;">
            <strong>${m.name}</strong> — ${m.dosage} · ${m.duration} ${m.instructions ? '· ' + m.instructions : ''}
          </div>`).join('')}
        </div>` : ''}
        ${p.instructions ? `<div style="margin-top:0.75rem;font-size:0.82rem;color:#475569;"><strong>Instructions:</strong> ${p.instructions}</div>` : ''}
        ${p.attachments && p.attachments.length ? `
        <div style="margin-top:0.75rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
          ${p.attachments.map(a => `<a href="${a.url}" target="_blank" class="btn-outline btn-sm"><i class="fas fa-paperclip"></i> ${a.name || 'Attachment'}</a>`).join('')}
        </div>` : ''}
      </div>
    `).join('');
  }

  async function deletePrescription(id) {
    if (!confirm('Delete this prescription?')) return;
    await fetch(API_BASE + '/api/prescriptions/' + id, { method: 'DELETE' });
    showToast('Deleted', 'Prescription deleted', 'success');
    searchPrescriptions();
  }

  function adminLogout() {
    const token = sessionStorage.getItem('adminToken');
    fetch(API_BASE + '/api/admin/logout', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token }) }).catch(()=>{});
    sessionStorage.removeItem('adminToken');
    window.location.href = 'admin-login.html';
  }
</script>
</body>
</html>
